/* ── Auto-resize for Wix iframe ── */
function useAutoResize() {
  useEffect(() => {
    const notify = () => {
      const h = document.documentElement.scrollHeight;
      window.parent.postMessage({ type: 'wix-height', height: h }, '*');
      window.parent.postMessage({ height: h }, '*'); // generic fallback
    };
    notify();
    const obs = new ResizeObserver(notify);
    obs.observe(document.body);
    return () => obs.disconnect();
  }, []);
}

/* ── Mobile hook ── */
function useIsMobile() {
  const [mobile, setMobile] = useState(() => window.innerWidth < 480);
  useEffect(() => {
    const fn = () => setMobile(window.innerWidth < 480);
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, []);
  return mobile;
}

/* ── Date parser ── */
function parseFlexDate(s) {
  if (!s) return null;
  const str = s.trim().replace(/(\d+)(st|nd|rd|th)\b/gi, '$1');
  const mm = {jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12,january:1,february:2,march:3,april:4,june:6,july:7,august:8,september:9,october:10,november:11,december:12};
  let m;
  m = str.match(/^(\d{1,2})[\/\-]([A-Za-z]{3,})[\/\-](\d{4})$/);
  if (m) { const mo = mm[m[2].toLowerCase()]; if (mo) return toISO(+m[3], mo, +m[1]); }
  m = str.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if (m) return toISO(+m[3], +m[2], +m[1]);
  m = str.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
  if (m) return toISO(+m[1], +m[2], +m[3]);
  m = str.match(/^(\d{1,2})\s+([A-Za-z]{3,})\s+(\d{4})$/);
  if (m) { const mo = mm[m[2].toLowerCase()]; if (mo) return toISO(+m[3], mo, +m[1]); }
  m = str.match(/^([A-Za-z]{3,})\s+(\d{1,2}),?\s+(\d{4})$/);
  if (m) { const mo = mm[m[1].toLowerCase()]; if (mo) return toISO(+m[3], mo, +m[2]); }
  return null;
}
function toISO(y, m, d) {
  if (m < 1 || m > 12 || d < 1 || d > 31) return null;
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function fyLabel(endYear) {
  return `FY ${String(endYear - 1).slice(-2)}-${String(endYear).slice(-2)}`;
}

function buildApproxResult({
  returnDate,
  departureDate,

    incomeAbove15L
  });

  return {
    yearOfReturn: fyEndingYear(parseDate(returnDate)),
    returnDate,
    fys
  };
}

  });
}

/* ── Parse trip text into trip objects; returns { trips, errors } ── */
function parseTripText(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  // Strip any header/instruction lines the AI might add
  const dataLines = lines.filter(l => {
    const lower = l.toLowerCase();
    return !(lower.startsWith('kindly') || lower.startsWith('note:') || lower.startsWith('//') || lower.startsWith('#'));
  });
  const trips = [], errors = [];
  dataLines.forEach((line, idx) => {
    let parts = [];
    if (/\s+to\s+/i.test(line)) parts = line.split(/\s+to\s+/i).map(s => s.trim());
    else if (/\t/.test(line)) parts = line.split(/\t+/).map(s => s.trim());
    else {
      const gaps = []; const re = /\s{2,}/g; let m2;
      while ((m2 = re.exec(line)) !== null) gaps.push({ idx: m2.index, len: m2[0].length });
      if (gaps.length >= 1) {
        const best = gaps.reduce((a, b) => b.len > a.len ? b : a, gaps[0]);
        parts = [line.slice(0, best.idx).trim(), line.slice(best.idx + best.len).trim()];
      } else parts = [line];
    }
    if (parts.length < 2) { errors.push(`Line ${idx + 1}: Need two dates — "${line}"`); return; }
    const d1 = parseFlexDate(parts[0]), d2 = parseFlexDate(parts[1]);
    if (!d1) { errors.push(`Line ${idx + 1}: Can't read arrival date — "${parts[0]}"`); return; }
    if (!d2) { errors.push(`Line ${idx + 1}: Can't read departure date — "${parts[1]}"`); return; }
    if (parseDate(d2) < parseDate(d1)) { errors.push(`Line ${idx + 1}: Departure is before arrival`); return; }
    trips.push({ in: d1, out: d2 });
  });
  return { trips, errors };
}

/* ── Optimisation helpers ── */
function rnorCountFrom(res) {
  const yor = res.yearOfReturn;
  return res.fys.filter(f => f.status === 'RNOR' && f.endYear >= yor && f.endYear < yor + 5).length;
}

function findOpt1(baseDate, mode, avgDays, customDays, trips, departureDateStr) {
  for (let shift = 1; shift <= 400; shift++) {
    const d = new Date(baseDate);
    d.setDate(d.getDate() + shift);
    const s = d.toISOString().split('T')[0];
    const res = buildApproxResult({
      returnDate: s,
      departureDate: departureDateStr,
      mode,
      avgDays,
      customDays,
      trips
    });
    if (!res) continue;
    if (rnorCountFrom(res) >= 3) return { date: d, shift, rnorCount: rnorCountFrom(res) };
  }
  return null;
}

function findOpt2(baseDate, mode, avgDays, customDays, trips, departureDateStr) {
  for (let shift = 1; shift <= 500; shift++) {
    const d = new Date(baseDate);
    d.setDate(d.getDate() + shift);
    const s = d.toISOString().split('T')[0];
    const res = buildApproxResult({
      returnDate: s,
      departureDate: departureDateStr,
      mode,
      avgDays,
      customDays,
      trips
    });
    if (!res) continue;
    const yor = res.yearOfReturn;
    const fys = res.fys.filter(f => f.endYear >= yor && f.endYear < yor + 5);
    if (fys.length >= 3 && fys[0].status === 'NR' && fys[1].status === 'RNOR' && fys[2].status === 'RNOR') {
      return { date: d, shift };
    }
  }
  return null;
}

/* ── AI Helper ── */
function AIPromptHelper() {
  const [expanded, setExpanded] = useState(true);
  const [copied, setCopied] = useState(false);

  const prompt = `I am sharing a travel history. It may be in one of these formats:
- A travel history document (lists arrivals/departures in reverse chronological order. Always start from the oldest travel date)
- A personal note or message describing trips in natural language (e.g. "Went to India on Dec 8, 2017")
- Any other format describing when I have travelled to and from India

Purpose:
- I have an RNOR calculator that accepts travel dates in a specific text format, so I want you to extract my travel dates in that specific format.

Rules:
- Extract only trips to India (ignore Mexico, UAE, or any other country)
- A trip starts when the person arrives in India and ends when they leave India
- If the source is a travel history document (arrival/departure rows):
  - Start from the last row and work upward
  - If the most recent entry is an arrival in India (which means I am currently in India), assume the departure is today for calculation purposes
  - If the location column has a Non-Indian city, don't get confused, it means I arrived at/departed from that location (and always the other side is India, unless explicitly mentioned)
- If the source is a personal note or natural language:
  - "Went to India" = arrived in India
  - "Came to USA" / "Came back" / "Returned to USA" = left India
  - Ignore any travel that does not involve India

Output format — one trip per line, no explanations, no headers:
"""
Kindly Paste this in the RNOR Calculator:

DD-MMM-YYYY to DD-MMM-YYYY
DD-MMM-YYYY to DD-MMM-YYYY
"""`;

  const handleCopy = (e) => {
    e.stopPropagation();
    const doFallback = () => {
      try {
        const ta = document.createElement('textarea');
        ta.value = prompt;
        ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none';
        document.body.appendChild(ta);
        ta.focus(); ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      } catch(_) {}
      setCopied(true); setTimeout(() => setCopied(false), 2500);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(prompt).then(() => {
        setCopied(true); setTimeout(() => setCopied(false), 2500);
      }).catch(doFallback);
    } else { doFallback(); }
  };

  return (
    <div style={{ marginBottom: 12 }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        background: T.indigoSoft, border: `1.5px solid ${T.indigoBorder}`,
        borderRadius: expanded ? '12px 12px 0 0' : 12, padding: '9px 14px', cursor: 'pointer',
      }} onClick={() => setExpanded(e => !e)}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 7 }}>
          <span style={{ fontSize: 14 }}>✨</span>
          <span style={{ fontSize: 12, fontWeight: 700, color: T.indigo }}>Format trips using AI</span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <button onClick={handleCopy} style={{
            padding: '5px 12px', background: copied ? '#10B981' : T.indigo, color: '#fff',
            border: 'none', borderRadius: 6, fontSize: 11, fontWeight: 700,
            cursor: 'pointer', transition: 'background 0.2s',
          }}>
            {copied ? '✓ Copied' : 'Copy Prompt'}
          </button>
          <span style={{ fontSize: 11, color: T.indigo }}>{expanded ? '▲' : '▼'}</span>
        </div>
      </div>
      {expanded && (
        <div style={{
          background: T.indigoSoft, border: `1.5px solid ${T.indigoBorder}`,
          borderTop: 'none', borderRadius: '0 0 12px 12px', padding: '10px 14px 12px',
        }}>
          <ol style={{ paddingLeft: 18, margin: 0, fontSize: 11, color: '#5B5B8A', lineHeight: 1.9 }}>
            <li>Click <strong>"Copy Prompt"</strong> above</li>
            <li>Open <strong>ChatGPT</strong> or <strong>Claude</strong> and paste it</li>
            <li>Share your travel history (passport stamps, a note, any format)</li>
            <li>Copy the formatted output and <strong>paste it in the box below</strong></li>
          </ol>
        </div>
      )}
    </div>
  );
}

/* ── Exact Days Grid ── */
function ExactDaysInput({ returnDate, departureDate, customDays, setCustomDays }) {
  const rDate = parseDate(returnDate);
  if (!rDate) return (
    <div style={{ fontSize: 12, color: T.muted, padding: 12, background: T.subtle, borderRadius: 8, textAlign: 'center' }}>
      Enter a return date first
    </div>
  );

  const yor = fyEndingYear(rDate);
  const depDate = departureDate ? parseDate(departureDate) : null;
  const depFyEndYear = depDate ? fyEndingYear(depDate) : null;

  const fys = [];
  for (let i = 0; i < 7; i++) {
    const endYear = yor - 7 + i;
    if (endYear >= yor) continue;
    if (depFyEndYear && endYear <= depFyEndYear) continue;
    fys.push({
      endYear,
      label: fyLabel(endYear)
    });
  }

  if (fys.length === 0) {
    return (
      <div style={{ fontSize: 12, color: T.muted, padding: 12, background: T.subtle, borderRadius: 8, textAlign: 'center', lineHeight: 1.6 }}>
        All years before your return are auto-calculated from your departure date.
      </div>
    );
  }

  return (
    <div>
      {depFyEndYear && (
        <div style={{ fontSize: 11, color: T.muted, marginBottom: 10, lineHeight: 1.6 }}>
          Years before you moved abroad are auto-calculated. Enter visit days for the years below.
        </div>
      )}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(120px, 1fr))', gap: 8 }}>
        {fys.map(fy => (
          <label key={fy.endYear} style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
            <span style={{ fontSize: 10, fontWeight: 600, color: T.muted, fontFamily: F.mono }}>{fy.label}</span>
            <div style={{ display: 'flex', alignItems: 'center', border: `1.5px solid ${T.border}`, borderRadius: 8, background: T.paper }}>
              <input
                type="number"
                min={0}
                max={365}
                value={customDays[fy.endYear] ?? ''}
                placeholder="0"
                onChange={e => {
                  const v = Math.min(365, Math.max(0, parseInt(e.target.value) || 0));
                  setCustomDays(prev => ({ ...prev, [fy.endYear]: v }));
                }}
                style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent', padding: '7px 8px', fontSize: 13, fontFamily: F.mono, color: T.ink, width: '100%' }}
                onFocus={e => e.target.parentElement.style.borderColor = T.mint}
                onBlur={e => e.target.parentElement.style.borderColor = T.border}
              />
              <span style={{ fontSize: 9, color: T.muted, paddingRight: 7, fontFamily: F.mono }}>d</span>
            </div>
          </label>
        ))}
      </div>
    </div>
  );
}

/* ── Main App ── */
function App() {
  const [step, setStep] = useState(0);
  const [returnDate, setReturnDate] = useState('');
  const [departureDate, setDepartureDate] = useState('');
  const [mode, setMode] = useState('avg');
  const [avgDays, setAvgDays] = useState('');
  const [incomeAbove15L, setIncomeAbove15L] = useState(false);
  const [isIndianCitizen, setIsIndianCitizen] = useState(true);
  const [isPIO, setIsPIO] = useState(false);
  const [leftForEmployment, setLeftForEmployment] = useState(false);
  const [isCrew, setIsCrew] = useState(false);
  const [isVisitingIndia, setIsVisitingIndia] = useState(false);
  const [notTaxedAnywhere, setNotTaxedAnywhere] = useState(false);
  const [customDays, setCustomDays] = useState({});

  /* Trip text lives here so Calculate can access it */
  const [tripText, setTripText] = useState('');
  const [trips, setTrips] = useState([]);
  const [tripErrors, setTripErrors] = useState([]);
  const [tripParsedCount, setTripParsedCount] = useState(0);

  const [animKey, setAnimKey] = useState(0);
  const [calculating, setCalculating] = useState(false);
  const scrollRef = useRef(null);
  const mobile = useIsMobile();

  /* Clear trip state on mode change away from trips */
  useEffect(() => {
    if (mode !== 'trips') { setTripErrors([]); }
  }, [mode]);

  /* Derive customDays from trips whenever trips update */

  useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = 0; }, [step]);

  const ad = mode === 'avg' ? (Number(avgDays) || 0) : 0;
  const customForMode = mode === 'custom' ? customDays : null;
  const tripsForMode = mode === 'trips' ? trips : null;

  const result = useMemo(() => {
    if (!returnDate || !departureDate) return null;

    return buildAccurateResult({
      returnDate,
      departureDate,

      avgDays: ad,
      customDays: customForMode,

      isIndianCitizen,
      isPIO,
      leftForEmployment,
      isCrew,
      isVisitingIndia,
      incomeAbove15L,
      notTaxedAnywhere
    });
  }, [
    returnDate,
    departureDate,
    ad,
    customForMode,
    isIndianCitizen,
    isPIO,
    leftForEmployment,
    isCrew,
    isVisitingIndia,
    incomeAbove15L,
    notTaxedAnywhere
  ]);

  const fiveYearStatus = useMemo(() => {
    if (!result) return [];
    const yor = result.yearOfReturn;
    return result.fys
      .filter(f => f.endYear >= yor && f.endYear < yor + 5)
      .map(f => ({ ...f, label: fyLabel(f.endYear) }));
  }, [result]);

  const rnorCount = fiveYearStatus.filter(f => f.status === 'RNOR').length;

  const opt1 = useMemo(() => {
    if (!result || rnorCount !== 2) return null;
    return findOpt1(result.returnDate, mode, ad, customForMode, tripsForMode, departureDate);
  }, [result, rnorCount, mode, ad, customForMode, tripsForMode, departureDate]);

  const opt2 = useMemo(() => {
    if (!result || rnorCount > 2) return null;
    return findOpt2(result.returnDate, mode, ad, customForMode, tripsForMode, departureDate);
  }, [result, rnorCount, mode, ad, customForMode, tripsForMode, departureDate]);

  const opt1Statuses = useMemo(() => {
    if (!opt1) return null;
    const res = buildApproxResult({
      returnDate: opt1.date.toISOString().split('T')[0],
      departureDate,
      mode,
      avgDays: ad,
      customDays: customForMode,
      trips: tripsForMode
    });
    if (!res) return null;
    const yor = res.yearOfReturn;
    return res.fys
      .filter(f => f.endYear >= yor && f.endYear < yor + 4)
      .map(f => ({ status: f.status, label: fyLabel(f.endYear) }));
  }, [opt1, mode, ad, customForMode, tripsForMode, departureDate]);

  const opt2Statuses = useMemo(() => {
    if (!opt2) return null;
    const res = buildApproxResult({
      returnDate: opt2.date.toISOString().split('T')[0],
      departureDate,
      mode,
      avgDays: ad,
      customDays: customForMode,
      trips: tripsForMode
    });
    if (!res) return null;
    const yor = res.yearOfReturn;
    return res.fys
      .filter(f => f.endYear >= yor && f.endYear < yor + 4)
      .map(f => ({ status: f.status, label: fyLabel(f.endYear) }));
  }, [opt2, mode, ad, customForMode, tripsForMode, departureDate]);

  const retParsed = returnDate ? parseDate(returnDate) : null;
  const depParsed = departureDate ? parseDate(departureDate) : null;
  const dateOrderError = !!(depParsed && retParsed && depParsed >= retParsed);

  const avgEmpty = mode === 'avg' && (!avgDays || avgDays === '');
  // In exact mode with a departure date, pre-departure FYs are auto-calculated,
  // so an empty customDays is valid (user may have 0 visit days while abroad).
  const customEmpty = mode === 'custom' && !departureDate && Object.values(customDays).filter(v => v > 0).length === 0;
  const canProceed = !!(
    returnDate &&
    departureDate &&
    !dateOrderError
  );

  // opt2 proposes the pattern: [NR, RNOR, RNOR, ...] — "skip the partial year"
  // Suppress opt2 if the user's current outlook already IS that exact pattern
  const alreadyCleanPattern =
    fiveYearStatus[0]?.status === 'NR' &&
    fiveYearStatus[1]?.status === 'RNOR' &&
    fiveYearStatus[2]?.status === 'RNOR';
  // Also suppress opt2 if opt1 already achieves 3 RNOR years (strictly better)
  const showOpt2 = opt2 && !alreadyCleanPattern && !(opt1 && opt1.rnorCount >= 3);
  const effectiveOptCount = [opt1, showOpt2 ? opt2 : null].filter(Boolean).length;
  const showOptimisations = rnorCount <= 2 && effectiveOptCount > 0;
  // Already optimal: either got max 3 RNOR years, or has 2 and no further improvement found
  const alreadyOptimal = rnorCount >= 3 || (rnorCount >= 2 && !showOptimisations);

  const scrollToTop = () => {
    // Scroll within the widget
    if (scrollRef.current) scrollRef.current.scrollTop = 0;
    window.scrollTo(0, 0);
    document.documentElement.scrollTop = 0;
    // Tell Wix host to scroll to top of the page
    window.parent.postMessage({ scrollTo: 0 }, '*');
    window.parent.postMessage({ action: 'scrollTo', y: 0 }, '*');
  };

  const handleCalculate = () => {
    if (!canProceed) return;

    /* In trip mode: parse first, block if errors */
    if (mode === 'trips') {
      if (!tripText.trim()) {
        setTripErrors(['Please paste your India trips above before calculating.']);
        return;
      }
      const { trips: parsed, errors } = parseTripText(tripText);
      setTripErrors(errors);
      setTripParsedCount(parsed.length);
      if (errors.length > 0) return;
      setTrips(parsed);
      setCalculating(true);
      setTimeout(() => {
        setCalculating(false);
        setAnimKey(k => k + 1);
        setStep(1);
        scrollToTop();
      }, 700);
      return;
    }

    setCalculating(true);
    setTimeout(() => {
      setCalculating(false);
      setAnimKey(k => k + 1);
      setStep(1);
      scrollToTop();
    }, 700);
  };

  useAutoResize();

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', background: T.subtle }}>
      {/* Body */}
      <div ref={scrollRef} style={{ flex: 1, overflowY: 'auto', padding: mobile ? '20px 14px 48px' : '32px 20px 60px' }}>
        <div style={{ width: '100%', maxWidth: 620, margin: '0 auto' }}>
          <Steps step={step} />

          {/* ── CALCULATING ── */}
          {calculating && (
            <div style={{ animation: 'fadeUp 0.2s ease-out both', textAlign: 'center', padding: '60px 20px' }}>
              <div style={{ display: 'inline-flex', flexDirection: 'column', alignItems: 'center', gap: 20 }}>
                <div style={{
                  width: 56, height: 56, borderRadius: '50%',
                  border: `3px solid ${T.border}`,
                  borderTopColor: T.mint,
                  animation: 'spin 0.7s linear infinite',
                }} />
                <div style={{ fontSize: 15, fontWeight: 700, color: T.ink }}>Calculating…</div>
                <div style={{ fontSize: 12, color: T.muted }}>Projecting your residency status</div>
              </div>
            </div>
          )}

          {/* ── INPUT ── */}
          {!calculating && step === 0 && (
            <div key="input" style={{ animation: 'fadeUp 0.35s ease-out both' }}>              <div style={{ background: T.paper, borderRadius: 20, border: `1.5px solid ${T.border}`, padding: mobile ? '20px 16px 18px' : '28px 22px 24px', marginBottom: 12 }}>
                <h2 style={{ fontSize: 20, fontWeight: 700, color: T.ink, marginBottom: 6, lineHeight: 1.3 }}>
                  When are you returning to India?
                </h2>
                <p style={{ fontSize: 12, color: T.mutedDark, marginBottom: 22, lineHeight: 1.7 }}>
                  We'll project your residency status — NR, RNOR, or ROR — for the 5 financial years after you return.
                </p>

                <label style={{ fontSize: 11, fontWeight: 700, color: T.mutedDark, letterSpacing: 0.5, display: 'block', marginBottom: 7, textTransform: 'uppercase' }}>
                  Date you left India permanently
                </label>
                <input type="date" value={departureDate} onChange={e => setDepartureDate(e.target.value)}
                  style={{
                    padding: '12px 14px', border: `1.5px solid ${dateOrderError ? T.red : T.border}`, borderRadius: 11,
                    fontSize: 15, fontFamily: F.body, color: T.ink, background: T.paper,
                    outline: 'none', width: '100%', marginBottom: 6,
                  }}
                  onFocus={e => e.target.style.borderColor = dateOrderError ? T.red : T.mint}

                />

                    Are you taxed in any country other than India?
                  </label>

                  <div style={{ display: 'flex', gap: 10 }}>
                    <button
                      onClick={() => setNotTaxedAnywhere(false)}
                      style={{
                        flex: 1,
                        padding: '10px',
                        borderRadius: 10,
                        border: `1.5px solid ${incomeAbove15L ? T.mint : T.border}`,
                        background: incomeAbove15L ? T.mintSoft : T.paper,
                        fontWeight: 700,
                        cursor: 'pointer'
                      }}
                    >
                      Yes
                    </button>

                    <button
                      onClick={() => setNotTaxedAnywhere(true)}
                      style={{
                        flex: 1,
                        padding: '10px',
                        borderRadius: 10,
                        border: `1.5px solid ${!incomeAbove15L ? T.mint : T.border}`,
                        background: !incomeAbove15L ? T.mintSoft : T.paper,
                        fontWeight: 700,
                        cursor: 'pointer'
                      }}
                    >
                      No
                    </button>
                  </div>
                </div>

                {/* Are you taxed in any country? */}

                {/* Advanced Mode */}

              </div>

              <button onClick={handleCalculate} disabled={!canProceed}
                style={{
                  width: '100%', padding: '15px', background: canProceed ? T.ink : T.border,
                  color: T.paper, border: 'none', borderRadius: 14, fontSize: 15,
                  fontWeight: 700, cursor: canProceed ? 'pointer' : 'default',
                  transition: 'all 0.2s', letterSpacing: 0.2,
                  boxShadow: canProceed ? '0 4px 14px rgba(0,0,0,0.18)' : 'none',
                }}
                onMouseOver={e => { if (canProceed) e.currentTarget.style.background = '#2a2a2a'; }}
                onMouseOut={e => { if (canProceed) e.currentTarget.style.background = T.ink; }}
              >
                Calculate My Status →
              </button>
            </div>
          )}

          {/* ── OUTPUT ── */}
          {!calculating && step === 1 && result && (
            <div key={'out-' + animKey} style={{ animation: 'fadeUp 0.35s ease-out both' }}>

              {/* Hero RNOR count — compact so opt card is visible above fold */}
              <div style={{
                background: rnorCount > 0 ? T.ink : T.subtle,
                borderRadius: 20, padding: mobile ? '16px 20px' : '20px 32px',
                marginBottom: 12, textAlign: 'center',
                border: rnorCount > 0 ? 'none' : `1.5px solid ${T.border}`,
                boxShadow: rnorCount > 0 ? '0 6px 24px rgba(0,0,0,0.16)' : 'none',
                display: 'flex', alignItems: 'center', justifyContent: 'center', gap: mobile ? 14 : 20,
              }}>
                <div style={{ fontSize: mobile ? 56 : 72, fontWeight: 700, lineHeight: 1, color: rnorCount > 0 ? T.mint : T.border, flexShrink: 0 }}>
                  {rnorCount}
                </div>
                <div style={{ textAlign: 'left' }}>
                  <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: 1.2, textTransform: 'uppercase', color: rnorCount > 0 ? 'rgba(255,255,255,0.4)' : T.muted, marginBottom: 4 }}>
                    RNOR Benefit Period
                  </div>
                  <div style={{ fontSize: mobile ? 14 : 16, fontWeight: 700, color: rnorCount > 0 ? 'rgba(255,255,255,0.9)' : T.mutedDark, lineHeight: 1.3 }}>
                    {rnorCount > 0 ? `financial year${rnorCount > 1 ? 's' : ''} of RNOR` : 'No RNOR benefit'}
                  </div>
                  <div style={{ fontSize: 11, color: rnorCount > 0 ? 'rgba(255,255,255,0.45)' : T.muted, marginTop: 4, lineHeight: 1.5 }}>
                    {rnorCount > 0 ? 'Foreign income stays tax-free during this window' : 'All worldwide income taxable from year of return'}
                  </div>
                </div>
              </div>

              {/* Year-by-year badges */}
              <div style={{ background: T.paper, borderRadius: 20, border: `1.5px solid ${T.border}`, padding: mobile ? '20px 16px 24px' : '28px 28px 32px', marginBottom: 16 }}>
                <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 0.6, textTransform: 'uppercase', color: T.muted, marginBottom: 6 }}>
                  Year-by-Year Outlook
                </div>
                <div style={{ fontSize: 13, color: T.mutedDark, marginBottom: 24, lineHeight: 1.5 }}>
                  Starting from <strong>{fyLabel(fiveYearStatus[0]?.endYear) || '—'}</strong>, the financial year you return
                </div>
                <div style={{ display: 'flex', gap: mobile ? 6 : 12 }}>
                  {fiveYearStatus.map(fy => (
                    <StatusBadge key={fy.label} status={fy.status} label={fyLabel(fy.endYear).replace('FY ', '')} mobile={mobile} />
                  ))}
                </div>
              </div>

              {/* Optimisations — always shown */}
              <div style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 0.5, textTransform: 'uppercase', color: T.mutedDark, marginBottom: 12, paddingLeft: 2 }}>
                  💡 {showOptimisations ? (effectiveOptCount === 1 ? "Here's how you can optimise" : 'You can do better — 2 options') : 'Optimisation'}
                </div>
                {alreadyOptimal ? (
                  <div style={{ background: T.mintSoft, border: `1.5px solid ${T.mint}`, borderRadius: 16, padding: '18px 20px', display: 'flex', alignItems: 'center', gap: 12 }}>
                    <span style={{ fontSize: 20 }}>🎯</span>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 700, color: '#0D5C4A', marginBottom: 4 }}>You already get the best possible outcome</div>
                      <div style={{ fontSize: 12, color: T.mutedDark, lineHeight: 1.6 }}>Your chosen return date gives you the maximum RNOR benefit. No adjustment needed.</div>
                    </div>
                  </div>
                ) : showOptimisations ? (
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr', gap: 12 }}>
                    {opt1 && (
                      <OptCard
                        tag={effectiveOptCount > 1 ? 'Option A — Delay slightly' : 'Optimisation'}
                        tagColor={T.teal} tagBg={T.tealSoft}
                        headline={`${opt1.rnorCount} full RNOR years`}
                        date={formatDateReadable(opt1.date)}
                        subtext={`${opt1.shift} day${opt1.shift > 1 ? 's' : ''} later. Return year still qualifies as RNOR — one extra year of foreign income tax-free.`}
                        miniStatuses={opt1Statuses}
                      />
                    )}
                    {showOpt2 && opt2 && (
                      <OptCard
                        tag="Option B — Skip the partial year"
                        tagColor={T.violet} tagBg={T.violetSoft}
                        headline="2 clean full RNOR years"
                        date={formatDateReadable(opt2.date)}
                        subtext={`Return year becomes NR (arrive too late to be resident). Next 2 full years are both RNOR — no partial-year messiness.`}
                        miniStatuses={opt2Statuses}
                      />
                    )}
                  </div>
                ) : rnorCount === 0 ? (
                  <div style={{ background: T.amberSoft, border: `1.5px solid ${T.amber}`, borderRadius: 16, padding: '18px 20px', display: 'flex', alignItems: 'center', gap: 12 }}>
                    <span style={{ fontSize: 20 }}>⚠️</span>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 700, color: T.amber, marginBottom: 4 }}>No RNOR window found</div>
                      <div style={{ fontSize: 12, color: T.mutedDark, lineHeight: 1.6 }}>Based on your dates, you may not qualify for RNOR. This typically happens when you moved abroad recently and still have several Resident years in the 7–10 year look-back. A Turtle advisor can review your exact history.</div>
                    </div>
                  </div>
                ) : (
                  <div style={{ background: T.paper, border: `1.5px solid ${T.border}`, borderRadius: 16, padding: '18px 20px', display: 'flex', alignItems: 'center', gap: 12 }}>
                    <span style={{ fontSize: 20 }}>✅</span>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 700, color: T.ink, marginBottom: 4 }}>No further optimisation available</div>
                      <div style={{ fontSize: 12, color: T.muted, lineHeight: 1.6 }}>Your chosen return date is already as good as it gets for this travel history. Shifting it further doesn't improve your RNOR window.</div>
                    </div>
                  </div>
                )}
              </div>

              {/* Note */}
              <div style={{ borderRadius: 14, border: `1px solid ${T.border}`, padding: mobile ? '14px 16px' : '16px 20px', marginBottom: 16, display: 'flex', gap: 12, alignItems: 'flex-start' }}>
                <span style={{ fontSize: 16, flexShrink: 0, marginTop: 1 }}>ℹ️</span>
                <div style={{ fontSize: 12, color: T.mutedDark, lineHeight: 1.8 }}>
                  This is an estimate based on average values. For your exact RNOR period calculation, your exact travel history over the past 7 financial years would be required, based on immigration stamps.
                </div>
              </div>

              {/* CTA */}
              <div style={{ display: 'flex', flexDirection: mobile ? 'column' : 'row', gap: 10 }}>
                <button onClick={() => setStep(0)} style={{
                  padding: '15px 20px', background: T.paper, color: T.ink,
                  border: `1.5px solid ${T.border}`, borderRadius: 14,
                  fontSize: 13, fontWeight: 700, cursor: 'pointer', transition: 'all 0.15s',
                  order: mobile ? 1 : 0, flexShrink: 0,
                }}
                  onMouseOver={e => e.currentTarget.style.borderColor = T.ink}
                  onMouseOut={e => e.currentTarget.style.borderColor = T.border}
                >
                  ← Recalculate
                </button>
                <a href="https://www.turtlefinance.in/karma-conversation"
                  target="_blank" rel="noopener noreferrer"
                  style={{
                    flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center',
                    padding: '15px 24px', background: T.ink, color: T.paper,
                    borderRadius: 14, fontSize: mobile ? 14 : 15, fontWeight: 700,
                    textDecoration: 'none', transition: 'background 0.2s',
                    boxShadow: '0 4px 14px rgba(0,0,0,0.18)',
                  }}
                  onMouseOver={e => e.currentTarget.style.background = '#2a2a2a'}
                  onMouseOut={e => e.currentTarget.style.background = T.ink}
                >
                  Talk to a Turtle Expert →
                </a>
              </div>
            </div>
          )}
        </div>
      </div>

      {/* Footer */}
      <div style={{ padding: '16px 20px', textAlign: 'center', fontSize: 10, color: T.muted }}>
        © {new Date().getFullYear()} Turtle Finance ·&nbsp;
        <a href="https://www.turtlefinance.in" target="_blank" rel="noopener noreferrer" style={{ color: T.muted, textDecoration: 'none' }}>turtlefinance.in</a>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
